redis-ha:
  enabled: false

global:
  domain: argocd.test.com

certificate:
  enabled: true

controller:
  replicas: 1

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    tls: true

repoServer:
  replicas: 1

applicationSet:
  replicas: 1
