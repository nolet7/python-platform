name: Python App CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: noletengine/python-app

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Show repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: helm lint helm/python-app

      - name: Render Helm templates
        run: helm template python-app helm/python-app

      - name: Build Docker image for PR validation
        if: github.event_name == 'pull_request'
        run: |
          docker build -t $IMAGE_NAME:pr-${{ github.sha }} .

  docker-publish:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            noletengine/python-app:latest
            noletengine/python-app:${{ github.sha }}
