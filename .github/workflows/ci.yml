name: Python App CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: noletengine/python-app
  RELEASE_NAME: python-app
  NAMESPACE: default

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: helm lint helm/python-app

  deploy:
    runs-on: python-platform-runners
    needs: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mkdir -p "$HOME/bin"
          mv kubectl "$HOME/bin/kubectl"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/kubectl" version --client

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Show runner info
        run: |
          echo "Running on self-hosted ARC runner"
          whoami
          pwd
          echo "PATH=$PATH"
          kubectl version --client
          kubectl get pods -n $NAMESPACE || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to cluster with Helm
        run: |
          helm upgrade --install $RELEASE_NAME ./helm/python-app \
            --namespace $NAMESPACE \
            --set image.repository=${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}

      - name: Verify deployment
        run: |
          kubectl get deployment,svc,ingress -n $NAMESPACE
          kubectl rollout status deployment/$RELEASE_NAME -n $NAMESPACE --timeout=180s
