name: Python App CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/python-app/**'
      - 'argocd/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: noletengine/python-app
  VALUES_FILE: helm/python-app/values.yaml
  APP_NAME: python-app

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.vars.outputs.commit_id }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set short commit id
        id: vars
        shell: bash
        run: |
          echo "commit_id=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: |
          helm lint helm/python-app

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.commit_id }}

  cd:
    needs: ci
    runs-on: python-platform-runners
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Python YAML dependency
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Update Helm values image tag
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path

          values_path = Path("helm/python-app/values.yaml")
          data = yaml.safe_load(values_path.read_text())

          data.setdefault("image", {})
          data["image"]["repository"] = "noletengine/python-app"
          data["image"]["tag"] = "${{ needs.ci.outputs.commit_id }}"

          values_path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

          echo "Updated values.yaml:"
          cat helm/python-app/values.yaml

      - name: Commit values update
        run: |
          git add helm/python-app/values.yaml
          git diff --cached --quiet || git commit -m "Update python-app image tag to ${{ needs.ci.outputs.commit_id }}"
          git push origin main

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          argocd version --client

      - name: Login to Argo CD
        run: |
          argocd login argocd.test.com \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --insecure \
            --grpc-web

      - name: Sync app
        run: |
          argocd app sync python-app --grpc-web
          argocd app wait python-app --health --sync --grpc-web --timeout 180
