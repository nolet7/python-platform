name: Python App CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'

env:
  IMAGE_NAME: noletengine/python-app

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: helm lint helm/python-app

  deploy:
    runs-on: python-platform-runners
    needs: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          echo "Running on self-hosted ARC runner"
          whoami
          pwd
          kubectl get pods -n default

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            noletengine/python-app:latest
            noletengine/python-app:${{ github.sha }}

      - name: Deploy to cluster with Helm
        run: |
          helm upgrade --install python-app ./helm/python-app \
            --namespace default \
            --set image.repository=noletengine/python-app \
            --set image.tag=${{ github.sha }}

      - name: Verify deployment
        run: |
          kubectl get deployment,svc,ingress -n default
          kubectl rollout status deployment/python-app -n default --timeout=180s
