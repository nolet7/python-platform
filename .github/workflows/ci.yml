name: Python App CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: noletengine/python-app

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: helm lint helm/python-app

      - name: Render Helm templates
        run: helm template python-app helm/python-app

      - name: Build Docker image for PR validation
        if: github.event_name == 'pull_request'
        run: |
          docker build -t $IMAGE_NAME:pr-${{ github.sha }} .

  deploy:
    runs-on: python-platform-runners
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Show runner info
        run: |
          echo "Running on self-hosted ARC runner"
          uname -a
          whoami
          pwd

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Verify cluster access
        run: |
          kubectl get nodes
          kubectl get pods -A

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            noletengine/python-app:latest
            noletengine/python-app:${{ github.sha }}

      - name: Update Helm values with commit SHA
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("helm/python-app/values.yaml")
          text = p.read_text()
          text = re.sub(r'(?m)^(\\s*tag:\\s*).*$',
                        r'\\1' + "${{ github.sha }}",
                        text)
          p.write_text(text)
          print(p.read_text())
          PY

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/python-app/values.yaml
          git diff --cached --quiet || git commit -m "deploy: update image tag to ${{ github.sha }}"
          git push origin main
